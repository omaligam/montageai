services:

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      PORT:          "8000"
      BASE_URL:      "${BASE_URL:-http://localhost:8000}"
      JWT_SECRET:    "${JWT_SECRET:-change-me-in-production}"
      OLLAMA_URL:    "${OLLAMA_URL:-http://host.docker.internal:11434/api/generate}"
      OLLAMA_MODEL:  "${OLLAMA_MODEL:-qwen3:latest}"
      DB_PATH:       "/data/montageai.db"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - clips_data:/tmp/montageai_outputs
      - db_data:/data
      - ./cookies.txt:/app/cookies.txt
      - ./backend:/app
    command: sh -c "pip install -r requirements.txt -q && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8000}"
    command: sh -c "npm install --prefer-offline 2>/dev/null || npm install && npm run dev"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  clips_data:
  db_data:
  frontend_modules:
